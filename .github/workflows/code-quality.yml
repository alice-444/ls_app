name: Code Quality 🔍

on:
  push:
    branches:
      - main
      - prod
      - dev
      - feat/*
      - style/*
    paths:
      - "front/**/*.js"
      - "front/**/*.ts"
      - "front/**/*.jsx"
      - "front/**/*.tsx"
      - "back/**/*.js"
      - "back/**/*.ts"
      - "back/**/*.jsx"
      - "back/**/*.tsx"
      - "**/package.json"
      - "pnpm-lock.yaml"
      - ".github/workflows/**"
  pull_request:
    branches:
      - main
      - prod
      - dev
      - feat/*
      - style/*
    paths:
      - "front/**/*.js"
      - "front/**/*.ts"
      - "front/**/*.jsx"
      - "front/**/*.tsx"
      - "back/**/*.js"
      - "back/**/*.ts"
      - "back/**/*.jsx"
      - "back/**/*.tsx"
      - "**/package.json"
      - "pnpm-lock.yaml"
      - ".github/workflows/**"

permissions: {}

jobs:
  sonarcloud:
    name: SonarCloud Analysis
    runs-on: ubuntu-latest
    timeout-minutes: 20

    permissions:
      contents: read
      packages: read
      statuses: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup PNPM and Node.js
        uses: digi-fry/setup-pnpm-node-action@v1
        with:
          node-version: "20"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Generate Prisma Client
        run: cd back && pnpm prisma generate --schema=prisma/schema/schema.prisma
        env:
          NODE_ENV: production
          DATABASE_URL: postgresql://user:password@localhost:5432/dbname?schema=public

      - name: Build applications
        run: pnpm run build || echo "Build failed, continuing with analysis"
        continue-on-error: true
        env:
          NODE_ENV: production
          NEXT_TELEMETRY_DISABLED: 1
          NEXT_PUBLIC_SERVER_URL: http://localhost:4500
          DATABASE_URL: postgresql://user:password@localhost:5432/dbname?schema=public
          SKIP_ENV_VALIDATION: true

      - name: Run tests for coverage
        run: pnpm run test:coverage || echo "No tests configured yet"
        continue-on-error: true
        env:
          NODE_ENV: test
          DATABASE_URL: postgresql://user:password@localhost:5432/dbname?schema=public

      - name: SonarCloud Scan
        uses: SonarSource/sonarcloud-github-action@v3
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}

      - name: Comment PR with SonarCloud results
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            const { data: comments } = await github.rest.issues.listComments({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
            });

            const botComment = comments.find(comment =>
              comment.user.type === 'Bot' &&
              comment.body.includes('SonarCloud')
            );

            if (botComment) {
              await github.rest.issues.deleteComment({
                comment_id: botComment.id,
                owner: context.repo.owner,
                repo: context.repo.repo,
              });
            }

            await github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: `🔍 **SonarCloud Analysis Complete**

              The code quality analysis has been completed.

              _Analysis triggered by @${{ github.actor }}_`
            });

  notify:
    name: Notify Results
    runs-on: ubuntu-latest
    timeout-minutes: 2
    needs: [sonarcloud]
    if: always() && github.event_name == 'pull_request'

    permissions:
      contents: read
      issues: write
      pull-requests: write

    steps:
      - name: Notify Results
        uses: actions/github-script@v7
        with:
          script: |
            const sonarResult = '${{ needs.sonarcloud.result }}';

            const getStatusEmoji = (result) => {
              switch(result) {
                case 'success': return '✅';
                case 'failure': return '❌';
                case 'cancelled': return '🚫';
                case 'skipped': return '⏭️';
                default: return '❓';
              }
            };

            const sonarStatus = `${getStatusEmoji(sonarResult)} **SonarCloud Analysis**: ${sonarResult}`;

            const hasFailure = sonarResult === 'failure';
            const allSuccess = sonarResult === 'success';

            let failureDetails = '';
            if (hasFailure) {
              failureDetails = '\n### 🔍 Failed Checks:\n\n';
              failureDetails += `- **SonarCloud Analysis** found code quality or security issues\n`;
              failureDetails += `  → [View SonarCloud logs](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }})\n`;
              failureDetails += '\n⚠️ Please fix these issues before merging.\n';
            }

            const title = allSuccess ? '✅ **Code Quality Check Passed**' : '⚠️ **Code Quality Check Results**';
            const body = title + '\n\n' +
              '### 📊 Check Status:\n\n' +
              sonarStatus + '\n' +
              failureDetails +
              '\n---\n' +
              '_Analysis triggered by @${{ github.actor }}_\n' +
              '📎 [View full workflow run](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }})';

            // Delete previous bot comment if exists
            const { data: comments } = await github.rest.issues.listComments({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
            });

            const botComment = comments.find(comment => 
              comment.user.type === 'Bot' && 
              comment.body.includes('Code Quality Check')
            );

            if (botComment) {
              await github.rest.issues.deleteComment({
                comment_id: botComment.id,
                owner: context.repo.owner,
                repo: context.repo.repo,
              });
            }

            await github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: body
            });
