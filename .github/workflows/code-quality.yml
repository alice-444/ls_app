name: Qualité de code 🔍

on:
  push:
    branches:
      - main
      - prod
      - dev
      - feat/*
      - fix/*
      - docs/*
      - test/*
      - style/*
  pull_request:
    branches:
      - main
      - prod
      - dev
      - feat/*
      - fix/*
      - docs/*
      - test/*
      - style/*

jobs:
  sonarqube:
    name: SonarQube Analysis
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: SonarQube Scan
        uses: SonarSource/sonarqube-scan-action@v5
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }} 