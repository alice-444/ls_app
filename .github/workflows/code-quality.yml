name: Code Quality 🔍

on:
  push:
    branches:
      - main
      - prod
      - dev
      - feat/*
    paths:
      - "apps/**/*.js"
      - "apps/**/*.ts"
      - "apps/**/*.jsx"
      - "apps/**/*.tsx"
      - "packages/**/*.js"
      - "packages/**/*.ts"
      - "packages/**/*.jsx"
      - "packages/**/*.tsx"
      - "**/package.json"
      - "pnpm-lock.yaml"
      - ".github/workflows/**"
  pull_request:
    branches:
      - main
      - prod
      - dev
      - feat/*
    paths:
      - "apps/**/*.js"
      - "apps/**/*.ts"
      - "apps/**/*.jsx"
      - "apps/**/*.tsx"
      - "packages/**/*.js"
      - "packages/**/*.ts"
      - "packages/**/*.jsx"
      - "packages/**/*.tsx"
      - "**/package.json"
      - "pnpm-lock.yaml"
      - ".github/workflows/**"

permissions: {}

jobs:
  super-linter:
    name: Super-Linter
    runs-on: ubuntu-latest
    timeout-minutes: 10

    permissions:
      contents: read
      packages: read
      statuses: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Super-linter
        uses: super-linter/super-linter@v7
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          VALIDATE_ALL_CODEBASE: true
          FILTER_REGEX_EXCLUDE: ".*/.next/.*|.*/node_modules/.*|.*/dist/.*|.*/.turbo/.*|.*/prisma/generated/.*"
          VALIDATE_TYPESCRIPT_ES: true
          VALIDATE_JAVASCRIPT_ES: true
          VALIDATE_JSON: true
          VALIDATE_YAML: true
          VALIDATE_MARKDOWN: true
          VALIDATE_BASH: true
          VALIDATE_DOCKERFILE_HADOLINT: true
          VALIDATE_CSS: true
  sonarqube:
    name: SonarQube Analysis
    runs-on: ubuntu-latest
    timeout-minutes: 20

    permissions:
      contents: read
      packages: read
      statuses: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup PNPM and Node.js
        uses: digi-fry/setup-pnpm-node-action@v1
        with:
          node-version: "20"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Generate Prisma Client
        run: pnpm run db:generate
        working-directory: apps/server

      - name: Build server application
        run: pnpm run build
        working-directory: apps/server
        env:
          NODE_ENV: production

      - name: Build web application
        run: pnpm run build
        working-directory: apps/web
        env:
          NODE_ENV: production
          NEXT_TELEMETRY_DISABLED: 1
          NEXT_PUBLIC_SERVER_URL: http://localhost:3000

      - name: Run tests for coverage
        run: pnpm run test:coverage
        env:
          NODE_ENV: test

      - name: SonarQube Scan
        uses: SonarSource/sonarqube-scan-action@v5
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}

      - name: Comment PR with SonarQube results
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            const { data: comments } = await github.rest.issues.listComments({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
            });

            const botComment = comments.find(comment => 
              comment.user.type === 'Bot' && 
              comment.body.includes('SonarQube')
            );

            if (botComment) {
              await github.rest.issues.deleteComment({
                comment_id: botComment.id,
                owner: context.repo.owner,
                repo: context.repo.repo,
              });
            }

            await github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: `🔍 **SonarQube Analysis Complete**
              
              The code quality analysis has been completed.
              
              _Analysis triggered by @${{ github.actor }}_`
            });

  notify:
    name: Notify Results
    runs-on: ubuntu-latest
    timeout-minutes: 2
    needs: [super-linter, sonarqube]
    if: always() && github.event_name == 'pull_request'

    permissions:
      contents: read
      issues: write
      pull-requests: write

    steps:
      - name: Notify Results
        uses: actions/github-script@v7
        with:
          script: |
            const linterResult = '${{ needs.super-linter.result }}';
            const sonarResult = '${{ needs.sonarqube.result }}';

            const getStatusEmoji = (result) => {
              switch(result) {
                case 'success': return '✅';
                case 'failure': return '❌';
                case 'cancelled': return '🚫';
                case 'skipped': return '⏭️';
                default: return '❓';
              }
            };

            const linterStatus = `${getStatusEmoji(linterResult)} **Super-Linter**: ${linterResult}`;
            const sonarStatus = `${getStatusEmoji(sonarResult)} **SonarQube Analysis**: ${sonarResult}`;

            const hasFailure = linterResult === 'failure' || sonarResult === 'failure';
            const allSuccess = linterResult === 'success' && sonarResult === 'success';

            let failureDetails = '';
            if (hasFailure) {
              failureDetails = '\n### 🔍 Failed Checks:\n\n';
              if (linterResult === 'failure') {
                failureDetails += `- **Super-Linter** detected code style or syntax issues\n`;
                failureDetails += `  → [View Super-Linter logs](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }})\n`;
              }
              if (sonarResult === 'failure') {
                failureDetails += `- **SonarQube Analysis** found code quality or security issues\n`;
                failureDetails += `  → [View SonarQube logs](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }})\n`;
              }
              failureDetails += '\n⚠️ Please fix these issues before merging.\n';
            }

            const title = allSuccess ? '✅ **Code Quality Check Passed**' : '⚠️ **Code Quality Check Results**';
            const body = title + '\n\n' +
              '### 📊 Check Status:\n\n' +
              linterStatus + '\n' +
              sonarStatus + '\n' +
              failureDetails +
              '\n---\n' +
              '_Analysis triggered by @${{ github.actor }}_\n' +
              '📎 [View full workflow run](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }})';

            // Delete previous bot comment if exists
            const { data: comments } = await github.rest.issues.listComments({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
            });

            const botComment = comments.find(comment => 
              comment.user.type === 'Bot' && 
              comment.body.includes('Code Quality Check')
            );

            if (botComment) {
              await github.rest.issues.deleteComment({
                comment_id: botComment.id,
                owner: context.repo.owner,
                repo: context.repo.repo,
              });
            }

            await github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: body
            });
