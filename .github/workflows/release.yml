name: Release (Test, Build, Deploy) 🚀

on:
  push:
    tags:
      - "[0-9]+.[0-9]+.[0-9]+"


jobs:
  # tests:
  #   name: Run Tests
  #   uses: ./.github/workflows/tests.yml
  #   secrets: inherit

  build-and-push-backend:
    name: Build & Push Backend
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
      - name: Extract branch or tag name
        id: extract_ref
        run: |
          if [[ "${GITHUB_REF}" == refs/tags/* ]]; then
            REF_NAME=${GITHUB_REF#refs/tags/}
          elif [[ "${GITHUB_REF}" == refs/heads/main ]]; then
            REF_NAME=${GITHUB_REF#refs/heads/}
          else
            REF_NAME=${GITHUB_HEAD_REF#refs/heads/}
          fi
          REF_NAME=$(echo "${REF_NAME}" | tr '/' '_')
          echo "REF_NAME=${REF_NAME}" >> $GITHUB_ENV
      - name: Publish to Registry
        uses: elgohr/Publish-Docker-Github-Action@v5
        with:
          name: miho11/back_ls
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}
          workdir: ./
          dockerfile: infra/docker/back/prod/Dockerfile
          tags: latest,${{ env.REF_NAME }}

  build-and-push-frontend:
    name: Build & Push Frontend
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
      - name: Extract branch or tag name
        id: extract_ref
        run: |
          if [[ "${GITHUB_REF}" == refs/tags/* ]]; then
            REF_NAME=${GITHUB_REF#refs/tags/}
          elif [[ "${GITHUB_REF}" == refs/heads/main ]]; then
            REF_NAME=${GITHUB_REF#refs/heads/}
          else
            REF_NAME=${GITHUB_HEAD_REF#refs/heads/}
          fi
          REF_NAME=$(echo "${REF_NAME}" | tr '/' '_')
          echo "REF_NAME=${REF_NAME}" >> $GITHUB_ENV
      - name: Publish to Registry
        uses: elgohr/Publish-Docker-Github-Action@v5
        with:
          name: miho11/front_ls
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}
          workdir: ./
          dockerfile: infra/docker/front/prod/Dockerfile
          tags: latest,${{ env.REF_NAME }}

  deploy:
    name: Deploy to Prod
    needs: [build-and-push-backend, build-and-push-frontend]
    runs-on: ubuntu-latest
    steps:
      - name: Extract branch or tag name
        id: extract_ref
        run: |
          if [[ "${GITHUB_REF}" == refs/tags/* ]]; then
            REF_NAME=${GITHUB_REF#refs/tags/}
          elif [[ "${GITHUB_REF}" == refs/heads/main ]]; then
            REF_NAME=${GITHUB_REF#refs/heads/}
          else
            REF_NAME=${GITHUB_HEAD_REF#refs/heads/}
          fi
          REF_NAME=$(echo "${REF_NAME}" | tr '/' '_')
          echo "REF_NAME=${REF_NAME}" >> $GITHUB_ENV
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USERNAME }}
          password: ${{ secrets.SSH_PASSWORD }}
          script: |
            cd /home/root/projects/learnsup-app/ls_app/infra/docker
            git pull
            FRONT_IMAGE_TAG=${{ env.REF_NAME }} BACK_IMAGE_TAG=${{ env.REF_NAME }} docker compose -f docker-compose-prod.yml down
            FRONT_IMAGE_TAG=${{ env.REF_NAME }} BACK_IMAGE_TAG=${{ env.REF_NAME }} docker compose -f docker-compose-prod.yml up -d --remove-orphans

