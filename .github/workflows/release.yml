name: Release (Test, Build, Deploy) 🚀

on:
  push:
    tags:
      - "[0-9]+.[0-9]+.[0-9]+"

jobs:
  tests:
    name: Run Tests
    uses: ./.github/workflows/tests.yml
    secrets: inherit

  build-and-push-backend:
    name: Build & Push Backend
    needs: tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Publish Backend to Registry
        uses: elgohr/Publish-Docker-Github-Action@v5
        with:
          name: miho11/back_ls
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}
          workdir: ./
          dockerfile: infra/docker/back/prod/Dockerfile
          tags: latest,${{ github.ref_name }}

  build-and-push-frontend:
    name: Build & Push Frontend
    needs: tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Publish Frontend to Registry
        uses: elgohr/Publish-Docker-Github-Action@v5
        with:
          name: miho11/front_ls
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}
          workdir: ./
          dockerfile: infra/docker/front/prod/Dockerfile
          tags: latest,${{ github.ref_name }}

  deploy:
    name: Deploy to Prod
    needs: [build-and-push-backend, build-and-push-frontend]
    runs-on: ubuntu-latest
    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USERNAME }}
          password: ${{ secrets.SSH_PASSWORD }}
          script: |
            cd ..
            cd /home/root/projects/learnsup-app/ls_app/infra/docker
            # Pull latest changes from git
            git pull origin main
            # Restart services
            docker-compose -f docker-compose-prod.yml up -d --remove-orphans

