name: Tests 🧪

on:
  push:
    branches:
      - main
      - prod
      - dev
    paths:
      - "src/**"
      - "**/*.js"
      - "**/*.ts"
      - "**/*.tsx"
      - "**/*.jsx"
      - "package.json"
      - "package-lock.json"
      - "yarn.lock"
      - "cypress/**"
      - "cypress.config.*"
  pull_request:
    branches:
      - main
      - prod
      - dev
    paths:
      - "src/**"
      - "**/*.js"
      - "**/*.ts"
      - "**/*.tsx"
      - "**/*.jsx"
      - "package.json"
      - "package-lock.json"
      - "yarn.lock"
      - "cypress/**"
      - "cypress.config.*"

permissions: {}

jobs:
  check-test-files:
    name: Check for Test Files
    runs-on: ubuntu-latest
    outputs:
      has-tests: ${{ steps.check.outputs.has-tests }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Check if PR contains test files
        id: check
        run: |
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            # Get changed files in PR
            CHANGED_FILES=$(git diff --name-only origin/${{ github.base_ref }}...HEAD)
            
            # Check if any test files are modified
            TEST_FILES=$(echo "$CHANGED_FILES" | grep -E '\.(test|spec)\.(js|jsx|ts|tsx)$|__tests__/|cypress/e2e/|test/|tests/')
            
            if [ -n "$TEST_FILES" ]; then
              echo "has-tests=true" >> $GITHUB_OUTPUT
              echo "Test files found:"
              echo "$TEST_FILES"
            else
              echo "has-tests=false" >> $GITHUB_OUTPUT
              echo "No test files found in PR"
            fi
          else
            # For push events, always run tests
            echo "has-tests=true" >> $GITHUB_OUTPUT
            echo "Push event - running tests"
          fi

  unit-tests:
    name: Unit Tests
    runs-on: ubuntu-latest
    needs: check-test-files
    if: needs.check-test-files.outputs.has-tests == 'true' || github.event_name == 'push'

    permissions:
      contents: read
      packages: read
      statuses: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "18"

      - name: Cache pnpm dependencies
        uses: actions/cache@v4
        with:
          path: |
            ~/.pnpm-store
            node_modules
            apps/*/node_modules
          key: ${{ runner.os }}-pnpm-${{ hashFiles('**/pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-pnpm-

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run unit tests
        run: pnpm run test:unit
        env:
          NODE_ENV: test
          CI: true

      - name: Upload test results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: unit-test-results
          path: |
            coverage/
            test-results/
            junit.xml
          retention-days: 30

  integration-tests:
    name: Integration Tests
    runs-on: ubuntu-latest
    needs: [check-test-files, unit-tests]
    if: needs.check-test-files.outputs.has-tests == 'true' || github.event_name == 'push'

    permissions:
      contents: read
      packages: read
      statuses: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "18"

      - name: Cache pnpm dependencies
        uses: actions/cache@v4
        with:
          path: |
            ~/.pnpm-store
            node_modules
            apps/*/node_modules
          key: ${{ runner.os }}-pnpm-${{ hashFiles('**/pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-pnpm-

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run integration tests
        run: pnpm run test:integration
        env:
          NODE_ENV: test
          CI: true

      - name: Upload integration test results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: integration-test-results
          path: |
            coverage/
            test-results/
            junit.xml
          retention-days: 30

  build:
    name: Build Application
    runs-on: ubuntu-latest
    needs: [check-test-files, unit-tests, integration-tests]
    if: needs.check-test-files.outputs.has-tests == 'true' || github.event_name == 'push'

    permissions:
      contents: read
      packages: read
      statuses: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "18"

      - name: Cache pnpm dependencies
        uses: actions/cache@v4
        with:
          path: |
            ~/.pnpm-store
            node_modules
            apps/*/node_modules
          key: ${{ runner.os }}-pnpm-${{ hashFiles('**/pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-pnpm-

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build application
        run: pnpm run build
        env:
          NODE_ENV: production

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: build-artifacts
          path: |
            dist/
            build/
            .next/
          retention-days: 7

  cypress-e2e:
    name: Cypress E2E Tests
    runs-on: ubuntu-latest
    needs: [check-test-files, build]
    if: needs.check-test-files.outputs.has-tests == 'true' || github.event_name == 'push'
    strategy:
      fail-fast: false
      matrix:
        containers: ${{ github.ref == 'refs/heads/prod' && '[1, 2, 3]' || '[1, 2]' }}

    permissions:
      contents: read
      packages: read
      statuses: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "18"

      - name: Cache pnpm dependencies
        uses: actions/cache@v4
        with:
          path: |
            ~/.pnpm-store
            node_modules
            apps/*/node_modules
          key: ${{ runner.os }}-pnpm-${{ hashFiles('**/pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-pnpm-

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          name: build-artifacts
          path: .

      - name: Cypress run
        uses: cypress-io/github-action@v6
        with:
          start: pnpm start
          wait-on: "http://localhost:3000"
          record: true
          parallel: true
          browser: chrome
          headed: false
          config-file: cypress.config.js
          spec: ${{ github.ref == 'refs/heads/prod' && 'cypress/e2e/**/*.cy.{js,jsx,ts,tsx}' || 'cypress/e2e/smoke/**/*.cy.{js,jsx,ts,tsx}' }}
        env:
          CYPRESS_RECORD_KEY: ${{ secrets.CYPRESS_RECORD_KEY }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          NODE_ENV: test

      - name: Upload Cypress screenshots
        uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: cypress-screenshots-${{ matrix.containers }}
          path: cypress/screenshots/
          retention-days: 30

      - name: Upload Cypress videos
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: cypress-videos-${{ matrix.containers }}
          path: cypress/videos/
          retention-days: 30

  test-summary:
    name: Test Summary
    runs-on: ubuntu-latest
    needs: [check-test-files, unit-tests, integration-tests, build, cypress-e2e]
    if: always()

    permissions:
      contents: read
      issues: write
      pull-requests: write

    steps:
      - name: Download all test artifacts
        uses: actions/download-artifact@v4
        with:
          path: test-artifacts

      - name: Generate test summary
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const path = require('path');
            
            let summary = '## 🧪 Test Results Summary\n\n';
            
            // Check if tests were skipped
            const hasTests = '${{ needs.check-test-files.outputs.has-tests }}' === 'true';
            
            if (!hasTests && '${{ github.event_name }}' === 'pull_request') {
              summary += '### ⏭️ Tests Skipped\n';
              summary += 'No test files were modified in this PR, so tests were skipped.\n\n';
              summary += '**Modified files:**\n';
              const changedFiles = '${{ github.event.head_commit.message }}'.split('\n').filter(line => line.trim());
              changedFiles.forEach(file => {
                summary += `- \`${file}\`\n`;
              });
            } else {
              // Check if artifacts exist
              const artifactsPath = 'test-artifacts';
              if (fs.existsSync(artifactsPath)) {
                const artifacts = fs.readdirSync(artifactsPath);
                
                summary += '### 📊 Coverage & Results\n';
                summary += '- Unit Tests: ✅ Passed\n';
                summary += '- Integration Tests: ✅ Passed\n';
                summary += '- E2E Tests: ✅ Passed\n';
                
                if ('${{ github.ref }}' === 'refs/heads/prod') {
                  summary += '  - _Production validation with enhanced E2E tests_\n';
                }
                
                summary += '\n### 📁 Artifacts Generated\n';
                artifacts.forEach(artifact => {
                  summary += `- \`${artifact}\`\n`;
                });
              } else {
                summary += '❌ No test artifacts found\n';
              }
            }
            
            summary += '\n---\n';
            summary += '_Generated automatically by GitHub Actions_';
            
            // Create or update comment
            const { data: comments } = await github.rest.issues.listComments({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
            });
            
            const botComment = comments.find(comment => 
              comment.user.type === 'Bot' && 
              comment.body.includes('Test Results Summary')
            );
            
            if (botComment) {
              await github.rest.issues.updateComment({
                comment_id: botComment.id,
                owner: context.repo.owner,
                repo: context.repo.repo,
                body: summary
              });
            } else {
              await github.rest.issues.createComment({
                issue_number: context.issue.number,
                owner: context.repo.owner,
                repo: context.repo.repo,
                body: summary
              });
            }
