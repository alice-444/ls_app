name: Deployment 🚀

on:
  push:
    branches:
      - prod
    paths:
      - "src/**"
      - "**/*.js"
      - "**/*.ts"
      - "**/*.jsx"
      - "**/*.tsx"
      - "package.json"
      - "package-lock.json"
      - "yarn.lock"
      - "docker/**"
      - "Dockerfile*"
  tags:
    - v*

permissions: {}

jobs:
  pre-release:
    name: Pre Release
    runs-on: ubuntu-latest
    if: github.ref_type == 'branch' && github.ref == 'refs/heads/prod'
    steps:
      - name: Build & test
        run: |
          echo "done!"
      - uses: marvinpinto/action-automatic-releases@latest
        with:
          repo_token: ${{ secrets.GITHUB_TOKEN }}
          automatic_release_tag: latest
          prerelease: true
          title: Development Build
          files: |
            LICENSE.txt
            *.jar

  tagged-release:
    name: Tagged Release
    runs-on: ubuntu-latest
    needs: pre-release
    if: github.ref_type == 'tag' && startsWith(github.ref, 'refs/tags/v')
    steps:
      - name: Build & test
        run: |
          echo "done!"
      - uses: marvinpinto/action-automatic-releases@latest
        with:
          repo_token: ${{ secrets.GITHUB_TOKEN }}
          prerelease: false
          files: |
            LICENSE.txt
            *.jar
