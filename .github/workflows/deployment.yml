name: Deployment 🚀

on:
  workflow_run:
    workflows: ["Tests 🧪", "Code Quality 🔍"]
    types:
      - completed
    branches:
      - prod
  push:
    tags:
      - v*

permissions: {}

jobs:
  check-prerequisites:
    name: Check Prerequisites
    runs-on: ubuntu-latest
    timeout-minutes: 5
    if: github.event_name == 'workflow_run'
    outputs:
      deploy-ready: ${{ steps.check.outputs.ready }}

    permissions:
      actions: read
      contents: read

    steps:
      - name: Check if tests and quality passed
        id: check
        uses: actions/github-script@v7
        with:
          script: |
            const branch = context.payload.workflow_run.head_branch;

            if (branch !== 'prod') {
              console.log('Not on prod branch, skipping deployment');
              core.setOutput('ready', 'false');
              return;
            }

            const { data: testRuns } = await github.rest.actions.listWorkflowRunsForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              workflow_id: 'tests.yml',
              branch: 'prod',
              per_page: 1,
              status: 'completed'
            });

            const { data: qualityRuns } = await github.rest.actions.listWorkflowRunsForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              workflow_id: 'code-quality.yml',
              branch: 'prod',
              per_page: 1,
              status: 'completed'
            });

            const testsSuccess = testRuns.workflow_runs[0]?.conclusion === 'success';
            const qualitySuccess = qualityRuns.workflow_runs[0]?.conclusion === 'success';

            console.log(`Tests: ${testsSuccess ? '✅' : '❌'} (${testRuns.workflow_runs[0]?.conclusion})`);
            console.log(`Code Quality: ${qualitySuccess ? '✅' : '❌'} (${qualityRuns.workflow_runs[0]?.conclusion})`);

            if (testsSuccess && qualitySuccess) {
              console.log('✅ All prerequisites passed - ready to deploy!');
              core.setOutput('ready', 'true');
            } else {
              console.log('❌ Prerequisites not met - deployment blocked');
              core.setOutput('ready', 'false');
            }

  pre-release:
    name: Pre Release
    runs-on: ubuntu-latest
    timeout-minutes: 30
    needs: check-prerequisites
    if: |
      github.event_name == 'workflow_run' &&
      needs.check-prerequisites.outputs.deploy-ready == 'true'

    permissions:
      contents: write
      packages: read

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup PNPM and Node.js
        uses: digi-fry/setup-pnpm-node-action@v1
        with:
          node-version: "20"

      - name: Build production
        run: pnpm run build
        env:
          NODE_ENV: production

      - name: Create build artifacts archive
        run: |
          mkdir -p release-artifacts
          tar -czf release-artifacts/build.tar.gz apps/web/.next apps/server/dist
          cp package.json pnpm-lock.yaml release-artifacts/
          echo "Build completed at $(date)" > release-artifacts/BUILD_INFO.txt
          echo "Commit: ${{ github.sha }}" >> release-artifacts/BUILD_INFO.txt
          echo "Branch: ${{ github.ref }}" >> release-artifacts/BUILD_INFO.txt

      - uses: marvinpinto/action-automatic-releases@latest
        with:
          repo_token: ${{ secrets.GITHUB_TOKEN }}
          automatic_release_tag: latest
          prerelease: true
          title: Development Build
          files: |
            release-artifacts/build.tar.gz
            release-artifacts/BUILD_INFO.txt
            release-artifacts/package.json
            release-artifacts/pnpm-lock.yaml

  tagged-release:
    name: Tagged Release
    runs-on: ubuntu-latest
    timeout-minutes: 30
    if: github.ref_type == 'tag' && startsWith(github.ref, 'refs/tags/v')

    permissions:
      contents: write
      packages: read

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup PNPM and Node.js
        uses: digi-fry/setup-pnpm-node-action@v1
        with:
          node-version: "20"

      - name: Build production
        run: pnpm run build
        env:
          NODE_ENV: production

      - name: Create build artifacts archive
        run: |
          mkdir -p release-artifacts
          tar -czf release-artifacts/build.tar.gz apps/web/.next apps/server/dist
          cp package.json pnpm-lock.yaml release-artifacts/
          echo "Build completed at $(date)" > release-artifacts/BUILD_INFO.txt
          echo "Version: ${{ github.ref_name }}" >> release-artifacts/BUILD_INFO.txt
          echo "Commit: ${{ github.sha }}" >> release-artifacts/BUILD_INFO.txt

      - uses: marvinpinto/action-automatic-releases@latest
        with:
          repo_token: ${{ secrets.GITHUB_TOKEN }}
          prerelease: false
          files: |
            release-artifacts/build.tar.gz
            release-artifacts/BUILD_INFO.txt
            release-artifacts/package.json
            release-artifacts/pnpm-lock.yaml

  notify-deployment:
    name: Notify Deployment
    runs-on: ubuntu-latest
    timeout-minutes: 5
    needs: [check-prerequisites, pre-release, tagged-release]
    if: always() && (needs.pre-release.result != 'skipped' || needs.tagged-release.result != 'skipped')

    permissions:
      contents: read
      issues: write
      pull-requests: write

    steps:
      - name: Notify deployment results
        uses: actions/github-script@v7
        with:
          script: |
            const preReleaseResult = '${{ needs.pre-release.result }}';
            const taggedReleaseResult = '${{ needs.tagged-release.result }}';
            const checkPrereqResult = '${{ needs.check-prerequisites.result }}';
            const deployReady = '${{ needs.check-prerequisites.outputs.deploy-ready }}';

            const getStatusEmoji = (result) => {
              switch(result) {
                case 'success': return '✅';
                case 'failure': return '❌';
                case 'cancelled': return '🚫';
                case 'skipped': return '⏭️';
                default: return '❓';
              }
            };

            let message = '## 🚀 Deployment Results\n\n';

            if (checkPrereqResult !== 'skipped' && deployReady === 'false') {
              message += '### 🛑 Deployment Blocked\n\n';
              message += 'Deployment was blocked because tests or code quality checks did not pass.\n\n';
              message += '**Prerequisites status:**\n';
              message += '- Tests and Code Quality must both pass before deployment\n';
              message += '\n[View Workflow Run](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }})\n';
              message += '\n---\n';
              message += '_Deployment blocked by quality gates_';
              
              await github.rest.repos.createCommitComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                commit_sha: context.sha,
                body: message
              });
              return;
            }

            if (preReleaseResult !== 'skipped') {
              message += `${getStatusEmoji(preReleaseResult)} **Pre-Release (latest)**: ${preReleaseResult}\n`;
            }

            if (taggedReleaseResult !== 'skipped') {
              message += `${getStatusEmoji(taggedReleaseResult)} **Tagged Release**: ${taggedReleaseResult}\n`;
            }

            const hasFailure = preReleaseResult === 'failure' || taggedReleaseResult === 'failure';
            const hasSuccess = preReleaseResult === 'success' || taggedReleaseResult === 'success';

            if (hasSuccess) {
              message += '\n### 🎉 Deployment Successful!\n\n';
              message += '**Release information:**\n';
              message += '- Repository: ${{ github.repository }}\n';
              message += '- Ref: `${{ github.ref }}`\n';
              message += '- Commit: `${{ github.sha }}`\n';
              message += '- Actor: @${{ github.actor }}\n';
              message += '\n[View Releases](${{ github.server_url }}/${{ github.repository }}/releases)';
            }

            if (hasFailure) {
              message += '\n### ❌ Deployment Failed\n\n';
              message += 'Please check the workflow logs for details.\n';
              message += '\n[View Workflow Run](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }})';
            }

            message += '\n\n---\n';
            message += '_Deployment triggered by @${{ github.actor }}_';

            // Create commit comment
            await github.rest.repos.createCommitComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              commit_sha: context.sha,
              body: message
            });
