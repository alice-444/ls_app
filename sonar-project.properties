sonar.projectKey=alice-444_ls_app
sonar.organization=hola-solar

# Project metadata
sonar.projectName=LearnSup App
sonar.projectVersion=1.0.0

# Source directories (monorepo : package unique `app`)
sonar.sources=app/src,app/server.ts
sonar.tests=app/__tests__

# Exclusions
sonar.exclusions=**/node_modules/**,**/.next/**,**/dist/**,**/build/**,**/.turbo/**,**/coverage/**,**/prisma/generated/**,**/*.min.js,**/*.min.css,**/public/**,**/*.d.ts,**/pnpm-lock.yaml

# Test coverage
sonar.javascript.lcov.reportPaths=coverage/lcov.info
sonar.typescript.lcov.reportPaths=coverage/lcov.info

# Language settings
sonar.sourceEncoding=UTF-8