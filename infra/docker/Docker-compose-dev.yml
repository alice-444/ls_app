services:
  # Service Frontend
  frontend:
    build:
      context: ../../
      dockerfile: ./infra/docker/front/Dockerfile.dev
    ports:
      - "3001:3001"
    volumes:
      - ../../front:/app
      - /app/node_modules
    depends_on:
      - backend
    networks:
      - app-network

  # Service Backend
  backend:
    build:
      context: ../../
      dockerfile: ./infra/docker/back/Dockerfile.dev
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=development
      - NEXT_TELEMETRY_DISABLED=1
      - PORT=3000
      - DATABASE_URL=${DATABASE_URL}
      - PRISMA_ACCELERATE_URL=${DATABASE_URL}
      - CORS_ORIGIN=${CORS_ORIGIN}
      - CRON_SECRET=${CRON_SECRET}
      - NODE_TLS_REJECT_UNAUTHORIZED=0
    volumes:
      # - ../../:/app
      - /app/node_modules
    networks:
      - app-network
    env_file:
      - .env

networks:
  app-network:
    driver: bridge
    driver_opts:
      com.docker.network.bridge.enable_ip_masquerade: "true"
