global:
  scrape_interval: 15s
  evaluation_interval: 15s
  external_labels:
    monitor: "ls-backend-monitor"

scrape_configs:
  - job_name: "backend-nextjs"
    static_configs:
      - targets: ["host.docker.internal:3000"]
        labels:
          instance: "nextjs-dev"
          environment: "development"
    metrics_path: "/api/metrics"
    scrape_interval: 10s
    scrape_timeout: 5s
    honor_labels: true

